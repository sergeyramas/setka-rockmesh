<svg viewBox="0 0 400 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Abstract schematic: Cheboksary center + 4 destination cities -->
  <!-- Cheboksary (center) -->
  <circle cx="220" cy="160" r="10" fill="#FF6B00"/>
  <text x="232" y="164" fill="#FF6B00" font-size="11" font-family="Inter, sans-serif" font-weight="700">Чебоксары</text>

  <!-- Moscow -->
  <circle cx="160" cy="100" r="6" fill="#ffffff" opacity="0.7"/>
  <text x="100" y="95" fill="#ffffff" font-size="10" font-family="Inter, sans-serif" opacity="0.7">Москва</text>
  <line x1="220" y1="160" x2="160" y2="100" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="6 4" class="svg-path-animated" style="--path-length:90"/>

  <!-- Saint Petersburg -->
  <circle cx="110" cy="60" r="6" fill="#ffffff" opacity="0.7"/>
  <text x="60" y="55" fill="#ffffff" font-size="10" font-family="Inter, sans-serif" opacity="0.7">СПб</text>
  <line x1="220" y1="160" x2="110" y2="60" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="6 4" class="svg-path-animated" style="--path-length:145"/>

  <!-- Kazan -->
  <circle cx="270" cy="140" r="6" fill="#ffffff" opacity="0.7"/>
  <text x="278" y="144" fill="#ffffff" font-size="10" font-family="Inter, sans-serif" opacity="0.7">Казань</text>
  <line x1="220" y1="160" x2="270" y2="140" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="6 4" class="svg-path-animated" style="--path-length:55"/>

  <!-- Nizhny Novgorod -->
  <circle cx="185" cy="120" r="6" fill="#ffffff" opacity="0.7"/>
  <text x="140" y="115" fill="#ffffff" font-size="10" font-family="Inter, sans-serif" opacity="0.7">Н.Новгород</text>
  <line x1="220" y1="160" x2="185" y2="120" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="6 4" class="svg-path-animated" style="--path-length:55"/>
</svg>
